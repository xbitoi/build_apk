openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: APK Builder Pro API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: projects
  - name: builds
  - name: keystore
  - name: gemini-keys
  - name: settings
  - name: stats
  - name: system
  - name: chat
  - name: conversations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/detect:
    post:
      operationId: detectProjectType
      tags: [projects]
      summary: Detect project framework type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectResult"

  /projects/{id}/build:
    post:
      operationId: startBuild
      tags: [builds]
      summary: Start a build for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartBuildBody"
      responses:
        "201":
          description: Build started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"

  /builds:
    get:
      operationId: listBuilds
      tags: [builds]
      summary: List all builds
      responses:
        "200":
          description: List of builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Build"

  /builds/{id}:
    get:
      operationId: getBuild
      tags: [builds]
      summary: Get a build
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Build
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"

  /builds/{id}/cancel:
    post:
      operationId: cancelBuild
      tags: [builds]
      summary: Cancel a running build
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"

  /keystore:
    get:
      operationId: listKeystores
      tags: [keystore]
      summary: List keystores
      responses:
        "200":
          description: List of keystores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Keystore"
    post:
      operationId: createKeystore
      tags: [keystore]
      summary: Create a keystore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeystoreBody"
      responses:
        "201":
          description: Keystore created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keystore"

  /keystore/{id}:
    get:
      operationId: getKeystore
      tags: [keystore]
      summary: Get a keystore
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Keystore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keystore"
    delete:
      operationId: deleteKeystore
      tags: [keystore]
      summary: Delete a keystore
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gemini-keys:
    get:
      operationId: listGeminiKeys
      tags: [gemini-keys]
      summary: List Gemini API key slots
      responses:
        "200":
          description: List of key slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiKeySlot"

  /gemini-keys/{slot}:
    put:
      operationId: updateGeminiKey
      tags: [gemini-keys]
      summary: Update a Gemini key slot
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGeminiKeyBody"
      responses:
        "200":
          description: Updated slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiKeySlot"

  /gemini-keys/{slot}/reset-exhausted:
    post:
      operationId: resetGeminiKeyExhausted
      tags: [gemini-keys]
      summary: Reset exhausted state of a key slot
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiKeySlot"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings object
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /settings/{key}:
    put:
      operationId: updateSetting
      tags: [settings]
      summary: Update a setting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                  value:
                    type: string
    delete:
      operationId: deleteSetting
      tags: [settings]
      summary: Delete a setting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /system/check:
    get:
      operationId: systemCheck
      tags: [system]
      summary: Check system tools availability
      responses:
        "200":
          description: System tools status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all chat conversations
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                projectId:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Project:
      type: object
      required: [id, name, sourceType, status, packageId, appName, versionName, versionCode, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sourceType:
          type: string
          enum: [github, zip, local]
        sourceUrl:
          type: string
          nullable: true
        packageId:
          type: string
        appName:
          type: string
        versionName:
          type: string
        versionCode:
          type: integer
        status:
          type: string
          enum: [pending, building, success, failed, cancelled]
        framework:
          type: string
          nullable: true
        buildTool:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    CreateProjectBody:
      type: object
      required: [name, sourceType]
      properties:
        name:
          type: string
        sourceType:
          type: string
          enum: [github, zip, local]
        sourceUrl:
          type: string
          nullable: true
        packageId:
          type: string
          nullable: true
        appName:
          type: string
          nullable: true
        versionName:
          type: string
          nullable: true
        versionCode:
          type: integer
          nullable: true

    DetectResult:
      type: object
      required: [detectedType, warnings, recommendations]
      properties:
        detectedType:
          type: string
        framework:
          type: string
          nullable: true
        buildTool:
          type: string
          nullable: true
        warnings:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string

    Build:
      type: object
      required: [id, projectId, buildType, outputFormat, status, progress, logs, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        buildType:
          type: string
          enum: [debug, release]
        outputFormat:
          type: string
          enum: [apk, aab]
        status:
          type: string
          enum: [queued, running, success, failed, cancelled]
        progress:
          type: integer
        logs:
          type: array
          items:
            type: string
        outputPath:
          type: string
          nullable: true
        outputSizeBytes:
          type: integer
          nullable: true
        minSdkVersion:
          type: integer
          nullable: true
        targetSdkVersion:
          type: integer
          nullable: true
        startedAt:
          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
        createdAt:
          type: string

    StartBuildBody:
      type: object
      required: [buildType, outputFormat, useKeystore]
      properties:
        buildType:
          type: string
          enum: [debug, release]
        outputFormat:
          type: string
          enum: [apk, aab]
        minSdkVersion:
          type: integer
          nullable: true
        targetSdkVersion:
          type: integer
          nullable: true
        useKeystore:
          type: boolean
        keystoreId:
          type: integer
          nullable: true

    Keystore:
      type: object
      required: [id, alias, commonName, createdAt]
      properties:
        id:
          type: integer
        alias:
          type: string
        commonName:
          type: string
        organization:
          type: string
          nullable: true
        validity:
          type: integer
          nullable: true
        filePath:
          type: string
          nullable: true
        createdAt:
          type: string

    CreateKeystoreBody:
      type: object
      required: [alias, commonName, password]
      properties:
        alias:
          type: string
        commonName:
          type: string
        organization:
          type: string
          nullable: true
        validity:
          type: integer
          nullable: true
        password:
          type: string

    GeminiKeySlot:
      type: object
      required: [slot, label, isActive, hasKey]
      properties:
        slot:
          type: integer
        label:
          type: string
        isActive:
          type: boolean
        hasKey:
          type: boolean
        exhaustedUntil:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true

    UpdateGeminiKeyBody:
      type: object
      properties:
        keyValue:
          type: string
        label:
          type: string
        isActive:
          type: boolean

    DashboardStats:
      type: object
      required: [totalProjects, totalBuilds, successfulBuilds, failedBuilds, runningBuilds, totalStorageBytes, recentBuilds]
      properties:
        totalProjects:
          type: integer
        totalBuilds:
          type: integer
        successfulBuilds:
          type: integer
        failedBuilds:
          type: integer
        runningBuilds:
          type: integer
        totalStorageBytes:
          type: integer
        recentBuilds:
          type: array
          items:
            $ref: "#/components/schemas/Build"

    SystemStatus:
      type: object
      required: [java, node, npm, git, gradle, android]
      properties:
        java:
          $ref: "#/components/schemas/ToolStatus"
        node:
          $ref: "#/components/schemas/ToolStatus"
        npm:
          $ref: "#/components/schemas/ToolStatus"
        git:
          $ref: "#/components/schemas/ToolStatus"
        gradle:
          $ref: "#/components/schemas/ToolStatus"
        android:
          $ref: "#/components/schemas/ToolStatus"

    ToolStatus:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
        version:
          type: string
          nullable: true

    Conversation:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        projectId:
          type: integer
          nullable: true
        model:
          type: string
          nullable: true
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    ConversationWithMessages:
      type: object
      required: [id, title, createdAt, updatedAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        projectId:
          type: integer
          nullable: true
        model:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    Message:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        requestType:
          type: string
          nullable: true
          enum: [question, command, null]
        toolEvents:
          type: array
          items:
            type: object
          nullable: true
        createdAt:
          type: string
